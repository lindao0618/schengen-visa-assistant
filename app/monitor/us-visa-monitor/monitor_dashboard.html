<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美签监控仪表板</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5em;
            font-weight: 300;
        }
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        .content {
            padding: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }
        .card {
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 10px;
            padding: 25px;
        }
        .card h2 {
            margin-top: 0;
            color: #495057;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        .stat-label {
            color: #6c757d;
            margin-top: 5px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-weight: 600;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .data-table th,
        .data-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #e1e5e9;
        }
        .data-table th {
            background: #f8f9fa;
            font-weight: 600;
            color: #495057;
        }
        .data-table tr:hover {
            background: #f8f9fa;
        }
        .connection-status {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .connection-status.connected {
            background: #28a745;
        }
        .connection-status.disconnected {
            background: #dc3545;
        }
        .connection-status.connecting {
            background: #ffc107;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            opacity: 0.9;
        }
        .log-container {
            max-height: 300px;
            overflow-y: auto;
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .log-entry {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 4px;
        }
        .log-entry.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        .log-entry.success {
            background: #d4edda;
            color: #155724;
        }
        .log-entry.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 美签监控仪表板</h1>
            <p>实时监控美签槽位，智能匹配推送</p>
        </div>
        
        <div class="content">
            <!-- 系统状态 -->
            <div class="card">
                <h2>📊 系统状态</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-number" id="totalMessages">0</div>
                        <div class="stat-label">总消息数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="matchedSlots">0</div>
                        <div class="stat-label">匹配槽位</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="activeSubscriptions">0</div>
                        <div class="stat-label">活跃订阅</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number" id="totalConnections">0</div>
                        <div class="stat-label">总连接数</div>
                    </div>
                </div>
                <div class="status info">
                    <span class="connection-status" id="connectionStatus"></span>
                    <span id="connectionText">检查连接状态...</span>
                </div>
                <button class="refresh-btn" onclick="refreshData()">🔄 刷新数据</button>
            </div>

            <!-- 当前配置 -->
            <div class="card">
                <h2>⚙️ 当前配置</h2>
                <div id="currentConfig">
                    <p>暂无配置信息</p>
                </div>
            </div>

            <!-- 前端数据历史 -->
            <div class="card">
                <h2>📥 前端数据历史</h2>
                <div id="frontendData">
                    <p>暂无数据</p>
                </div>
            </div>

            <!-- 数据摘要 -->
            <div class="card">
                <h2>📈 数据摘要</h2>
                <div id="dataSummary">
                    <p>暂无摘要数据</p>
                </div>
            </div>

            <!-- 系统日志 -->
            <div class="card">
                <h2>📝 系统日志</h2>
                <div class="log-container" id="systemLogs">
                    <div class="log-entry info">系统启动，等待数据...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8005';
        
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            refreshData();
            setInterval(refreshData, 10000); // 每10秒刷新一次
        });
        
        async function refreshData() {
            try {
                // 获取统计信息
                const statsResponse = await fetch(`${API_BASE}/stats`);
                const statsData = await statsResponse.json();
                
                document.getElementById('totalMessages').textContent = statsData.stats.total_messages;
                document.getElementById('matchedSlots').textContent = statsData.stats.matched_slots;
                document.getElementById('activeSubscriptions').textContent = statsData.subscriptions;
                document.getElementById('totalConnections').textContent = statsData.total_connections;
                
                // 获取当前配置
                const configResponse = await fetch(`${API_BASE}/config`);
                const configData = await configResponse.json();
                
                if (configData.config) {
                    const config = configData.config;
                    document.getElementById('currentConfig').innerHTML = `
                        <table class="data-table">
                            <tr>
                                <th>配置项</th>
                                <th>值</th>
                            </tr>
                            <tr>
                                <td>国家</td>
                                <td>${config.selected_countries ? config.selected_countries.join(', ') : 'N/A'}</td>
                            </tr>
                            <tr>
                                <td>签证类型</td>
                                <td>${config.selected_visa_types ? config.selected_visa_types.join(', ') : 'N/A'}</td>
                            </tr>
                            <tr>
                                <td>日期范围</td>
                                <td>${config.timeRanges ? config.timeRanges.map(r => `${r.startDate} - ${r.endDate}`).join(', ') : 'N/A'}</td>
                            </tr>
                            <tr>
                                <td>创建时间</td>
                                <td>${config.created_at ? new Date(config.created_at).toLocaleString() : 'N/A'}</td>
                            </tr>
                        </table>
                    `;
                } else {
                    document.getElementById('currentConfig').innerHTML = '<p>暂无配置信息</p>';
                }
                
                // 获取前端数据历史
                const historyResponse = await fetch(`${API_BASE}/submitted-data`);
                const historyData = await historyResponse.json();
                
                if (historyData.history && historyData.history.length > 0) {
                    const historyHtml = historyData.history.map((item, index) => `
                        <tr>
                            <td>${index + 1}</td>
                            <td>${item.selectedCountries ? item.selectedCountries.join(', ') : 'N/A'}</td>
                            <td>${item.selectedVisaTypes ? item.selectedVisaTypes.join(', ') : 'N/A'}</td>
                            <td>${item.timeRanges ? item.timeRanges.map(r => `${r.startDate} - ${r.endDate}`).join(', ') : 'N/A'}</td>
                            <td>${item.timestamp ? new Date(item.timestamp).toLocaleString() : 'N/A'}</td>
                        </tr>
                    `).join('');
                    
                    document.getElementById('frontendData').innerHTML = `
                        <table class="data-table">
                            <tr>
                                <th>序号</th>
                                <th>国家</th>
                                <th>签证类型</th>
                                <th>日期范围</th>
                                <th>提交时间</th>
                            </tr>
                            ${historyHtml}
                        </table>
                    `;
                } else {
                    document.getElementById('frontendData').innerHTML = '<p>暂无数据</p>';
                }
                
                // 获取数据摘要
                const summaryResponse = await fetch(`${API_BASE}/data-summary`);
                const summaryData = await summaryResponse.json();
                
                if (summaryData.summary && Object.keys(summaryData.summary).length > 0) {
                    const summary = summaryData.summary;
                    let summaryHtml = '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">';
                    
                    if (summary.most_selected_countries && summary.most_selected_countries.length > 0) {
                        summaryHtml += `
                            <div>
                                <h3>最常选择的国家</h3>
                                <ul>
                                    ${summary.most_selected_countries.map(item => `<li>${item[0]} (${item[1]}次)</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }
                    
                    if (summary.most_selected_visa_types && summary.most_selected_visa_types.length > 0) {
                        summaryHtml += `
                            <div>
                                <h3>最常选择的签证类型</h3>
                                <ul>
                                    ${summary.most_selected_visa_types.map(item => `<li>${item[0]} (${item[1]}次)</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    }
                    
                    summaryHtml += '</div>';
                    summaryHtml += `<p><strong>总提交次数:</strong> ${summary.total_submissions || 0}</p>`;
                    
                    document.getElementById('dataSummary').innerHTML = summaryHtml;
                } else {
                    document.getElementById('dataSummary').innerHTML = '<p>暂无摘要数据</p>';
                }
                
                // 更新连接状态
                const statusElement = document.getElementById('connectionStatus');
                const textElement = document.getElementById('connectionText');
                
                if (statsData.subscriptions > 0) {
                    statusElement.className = 'connection-status connected';
                    textElement.textContent = '监控运行中';
                } else {
                    statusElement.className = 'connection-status disconnected';
                    textElement.textContent = '监控未启动';
                }
                
                // 添加日志
                addLog('info', `数据刷新成功 - 消息数: ${statsData.stats.total_messages}, 匹配槽位: ${statsData.stats.matched_slots}`);
                
            } catch (error) {
                console.error('获取数据失败:', error);
                addLog('error', `获取数据失败: ${error.message}`);
                
                const statusElement = document.getElementById('connectionStatus');
                const textElement = document.getElementById('connectionText');
                statusElement.className = 'connection-status disconnected';
                textElement.textContent = '连接失败';
            }
        }
        
        function addLog(type, message) {
            const logsContainer = document.getElementById('systemLogs');
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry ${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            
            logsContainer.appendChild(logEntry);
            
            // 限制日志数量
            while (logsContainer.children.length > 50) {
                logsContainer.removeChild(logsContainer.firstChild);
            }
            
            // 自动滚动到底部
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }
    </script>
</body>
</html>
