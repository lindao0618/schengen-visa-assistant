<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .entity-node { fill: #4A90E2; stroke: #2E5C8A; stroke-width: 2; }
      .service-node { fill: #7ED321; stroke: #5BA91A; stroke-width: 2; }
      .document-node { fill: #F5A623; stroke: #D4841C; stroke-width: 2; }
      .country-node { fill: #BD10E0; stroke: #9013FE; stroke-width: 2; }
      .process-node { fill: #FF6B6B; stroke: #E55555; stroke-width: 2; }
      .data-node { fill: #50E3C2; stroke: #4ECDC4; stroke-width: 2; }
      
      .node-text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: central; fill: white; font-weight: bold; }
      .title-text { font-family: Arial, sans-serif; font-size: 24px; text-anchor: middle; dominant-baseline: central; fill: #2C3E50; font-weight: bold; }
      .subtitle-text { font-family: Arial, sans-serif; font-size: 16px; text-anchor: middle; dominant-baseline: central; fill: #7F8C8D; }
      
      .relation-line { stroke: #34495E; stroke-width: 2; marker-end: url(#arrowhead); }
      .strong-relation { stroke: #E74C3C; stroke-width: 3; marker-end: url(#arrowhead-strong); }
      .weak-relation { stroke: #95A5A6; stroke-width: 1; stroke-dasharray: 5,5; marker-end: url(#arrowhead-weak); }
      
      .legend-rect { fill: white; stroke: #BDC3C7; stroke-width: 1; }
      .legend-text { font-family: Arial, sans-serif; font-size: 11px; fill: #2C3E50; }
    </style>
    
    <marker id="arrowhead" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#34495E" />
    </marker>
    <marker id="arrowhead-strong" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#E74C3C" />
    </marker>
    <marker id="arrowhead-weak" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#95A5A6" />
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#ECF0F1"/>
  
  <!-- Title -->
  <text x="600" y="30" class="title-text">Visa Assistant System - Knowledge Graph</text>
  <text x="600" y="55" class="subtitle-text">Intelligent Visa Processing Platform</text>
  
  <!-- Core Entity Nodes -->
  
  <!-- Applicant -->
  <circle cx="200" cy="150" r="40" class="entity-node"/>
  <text x="200" y="150" class="node-text">Applicant</text>
  
  <!-- Visa Type -->
  <rect x="350" y="120" width="100" height="60" rx="10" class="country-node"/>
  <text x="400" y="150" class="node-text">Visa Type</text>
  
  <!-- Schengen Visa -->
  <rect x="520" y="100" width="80" height="50" rx="8" class="country-node"/>
  <text x="560" y="125" class="node-text">Schengen<tspan x="560" dy="12">Visa</tspan></text>
  
  <!-- US Visa -->
  <rect x="520" y="170" width="80" height="50" rx="8" class="country-node"/>
  <text x="560" y="195" class="node-text">US Visa</text>
  
  <!-- Country Nodes -->
  <ellipse cx="750" cy="125" rx="45" ry="25" class="country-node"/>
  <text x="750" y="125" class="node-text">France</text>
  
  <ellipse cx="850" cy="125" rx="45" ry="25" class="country-node"/>
  <text x="850" y="125" class="node-text">Germany</text>
  
  <ellipse cx="750" cy="195" rx="45" ry="25" class="country-node"/>
  <text x="750" y="195" class="node-text">USA</text>
  
  <!-- Service Nodes -->
  <rect x="100" y="280" width="120" height="50" rx="10" class="service-node"/>
  <text x="160" y="305" class="node-text">TLS Monitor<tspan x="160" dy="12">Service</tspan></text>
  
  <rect x="250" y="280" width="120" height="50" rx="10" class="service-node"/>
  <text x="310" y="305" class="node-text">AI Assistant<tspan x="310" dy="12">Service</tspan></text>
  
  <rect x="400" y="280" width="120" height="50" rx="10" class="service-node"/>
  <text x="460" y="305" class="node-text">DS160 Auto-Fill<tspan x="460" dy="12">Service</tspan></text>
  
  <rect x="550" y="280" width="120" height="50" rx="10" class="service-node"/>
  <text x="610" y="305" class="node-text">Document<tspan x="610" dy="12">Review</tspan></text>
  
  <rect x="700" y="280" width="120" height="50" rx="10" class="service-node"/>
  <text x="760" y="305" class="node-text">Itinerary<tspan x="760" dy="12">Generator</tspan></text>
  
  <!-- Document Nodes -->
  <rect x="150" y="400" width="100" height="40" rx="8" class="document-node"/>
  <text x="200" y="420" class="node-text">Passport</text>
  
  <rect x="280" y="400" width="100" height="40" rx="8" class="document-node"/>
  <text x="330" y="420" class="node-text">Photo</text>
  
  <rect x="410" y="400" width="100" height="40" rx="8" class="document-node"/>
  <text x="460" y="420" class="node-text">Bank<tspan x="460" dy="12">Statement</tspan></text>
  
  <rect x="540" y="400" width="100" height="40" rx="8" class="document-node"/>
  <text x="590" y="420" class="node-text">Employment<tspan x="590" dy="12">Certificate</tspan></text>
  
  <rect x="670" y="400" width="100" height="40" rx="8" class="document-node"/>
  <text x="720" y="420" class="node-text">Itinerary</text>
  
  <rect x="800" y="400" width="100" height="40" rx="8" class="document-node"/>
  <text x="850" y="420" class="node-text">Insurance</text>
  
  <!-- Process Nodes -->
  <rect x="100" y="520" width="100" height="50" rx="10" class="process-node"/>
  <text x="150" y="545" class="node-text">Slot<tspan x="150" dy="12">Monitoring</tspan></text>
  
  <rect x="230" y="520" width="100" height="50" rx="10" class="process-node"/>
  <text x="280" y="545" class="node-text">Document<tspan x="280" dy="12">Preparation</tspan></text>
  
  <rect x="360" y="520" width="100" height="50" rx="10" class="process-node"/>
  <text x="410" y="545" class="node-text">Form<tspan x="410" dy="12">Filling</tspan></text>
  
  <rect x="490" y="520" width="100" height="50" rx="10" class="process-node"/>
  <text x="540" y="545" class="node-text">Appointment<tspan x="540" dy="12">Booking</tspan></text>
  
  <rect x="620" y="520" width="100" height="50" rx="10" class="process-node"/>
  <text x="670" y="545" class="node-text">Interview<tspan x="670" dy="12">Preparation</tspan></text>
  
  <!-- Data Nodes -->
  <rect x="850" y="520" width="100" height="50" rx="10" class="data-node"/>
  <text x="900" y="545" class="node-text">Knowledge<tspan x="900" dy="12">Base</tspan></text>
  
  <rect x="980" y="520" width="100" height="50" rx="10" class="data-node"/>
  <text x="1030" y="545" class="node-text">FAQ<tspan x="1030" dy="12">Database</tspan></text>
  
  <!-- Relationship Lines -->
  
  <!-- Applicant to Visa Type -->
  <line x1="240" y1="150" x2="350" y2="150" class="relation-line strong-relation"/>
  
  <!-- Visa Type to Specific Visas -->
  <line x1="450" y1="140" x2="520" y2="125" class="relation-line"/>
  <line x1="450" y1="160" x2="520" y2="195" class="relation-line"/>
  
  <!-- Schengen Visa to Countries -->
  <line x1="600" y1="125" x2="705" y2="125" class="relation-line"/>
  <line x1="600" y1="125" x2="805" y2="125" class="relation-line"/>
  
  <!-- US Visa to USA -->
  <line x1="600" y1="195" x2="705" y2="195" class="relation-line"/>
  
  <!-- Applicant to Services -->
  <line x1="180" y1="190" x2="160" y2="280" class="relation-line weak-relation"/>
  <line x1="200" y1="190" x2="310" y2="280" class="relation-line strong-relation"/>
  <line x1="220" y1="190" x2="460" y2="280" class="relation-line"/>
  <line x1="240" y1="190" x2="610" y2="280" class="relation-line"/>
  <line x1="240" y1="190" x2="760" y2="280" class="relation-line"/>
  
  <!-- Services to Documents -->
  <line x1="200" y1="330" x2="200" y2="400" class="relation-line"/>
  <line x1="330" y1="330" x2="330" y2="400" class="relation-line"/>
  <line x1="460" y1="330" x2="460" y2="400" class="relation-line"/>
  <line x1="590" y1="330" x2="590" y2="400" class="relation-line"/>
  <line x1="720" y1="330" x2="720" y2="400" class="relation-line"/>
  <line x1="760" y1="330" x2="850" y2="400" class="relation-line"/>
  
  <!-- Documents to Processes -->
  <line x1="200" y1="440" x2="150" y2="520" class="relation-line"/>
  <line x1="330" y1="440" x2="280" y2="520" class="relation-line"/>
  <line x1="460" y1="440" x2="410" y2="520" class="relation-line"/>
  <line x1="590" y1="440" x2="540" y2="520" class="relation-line"/>
  <line x1="720" y1="440" x2="670" y2="520" class="relation-line"/>
  
  <!-- Process Flow -->
  <line x1="200" y1="545" x2="230" y2="545" class="relation-line strong-relation"/>
  <line x1="330" y1="545" x2="360" y2="545" class="relation-line strong-relation"/>
  <line x1="460" y1="545" x2="490" y2="545" class="relation-line strong-relation"/>
  <line x1="590" y1="545" x2="620" y2="545" class="relation-line strong-relation"/>
  
  <!-- AI Assistant to Knowledge Base -->
  <line x1="370" y1="305" x2="850" y2="545" class="relation-line strong-relation"/>
  <line x1="370" y1="305" x2="980" y2="545" class="relation-line strong-relation"/>
  
  <!-- Legend -->
  <rect x="50" y="650" width="300" height="130" class="legend-rect"/>
  <text x="60" y="665" class="legend-text" font-weight="bold">Legend:</text>
  
  <circle cx="70" cy="685" r="8" class="entity-node"/>
  <text x="85" y="690" class="legend-text">Applicant Entity</text>
  
  <rect x="62" y="700" width="16" height="12" rx="2" class="service-node"/>
  <text x="85" y="710" class="legend-text">Service Node</text>
  
  <rect x="62" y="720" width="16" height="12" rx="2" class="document-node"/>
  <text x="85" y="730" class="legend-text">Document Node</text>
  
  <rect x="62" y="740" width="16" height="12" rx="2" class="country-node"/>
  <text x="85" y="750" class="legend-text">Country/Visa Type</text>
  
  <rect x="62" y="760" width="16" height="12" rx="2" class="process-node"/>
  <text x="85" y="770" class="legend-text">Process Node</text>
  
  <line x1="200" y1="685" x2="230" y2="685" class="relation-line strong-relation"/>
  <text x="240" y="690" class="legend-text">Strong Relation</text>
  
  <line x1="200" y1="705" x2="230" y2="705" class="relation-line"/>
  <text x="240" y="710" class="legend-text">Normal Relation</text>
  
  <line x1="200" y1="725" x2="230" y2="725" class="relation-line weak-relation"/>
  <text x="240" y="730" class="legend-text">Weak Relation</text>
  
  <!-- System Architecture -->
  <rect x="900" y="650" width="280" height="130" class="legend-rect"/>
  <text x="910" y="665" class="legend-text" font-weight="bold">System Architecture:</text>
  
  <text x="910" y="685" class="legend-text">• Frontend: Next.js + React + TypeScript</text>
  <text x="910" y="700" class="legend-text">• Backend: Python FastAPI + Node.js API</text>
  <text x="910" y="715" class="legend-text">• Database: Prisma + SQLite/PostgreSQL</text>
  <text x="910" y="730" class="legend-text">• AI Service: OpenAI GPT + RAG Knowledge</text>
  <text x="910" y="745" class="legend-text">• Automation: Playwright + Selenium</text>
  <text x="910" y="760" class="legend-text">• Monitoring: WebSocket + Real-time Notify</text>
  
</svg>
